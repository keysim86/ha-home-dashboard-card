name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.server_url, 'github.com') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update version in JS
        run: |
          sed -i "s/v1\.0\.0/${{ steps.version.outputs.VERSION }}/g" home-dashboard-card.js

      - name: Create Forgejo Release
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          BODY=$(cat CHANGELOG.md | jq -Rs .)
          RESPONSE=$(curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${{ steps.version.outputs.VERSION }}\", \"name\": \"Home Dashboard Card ${{ steps.version.outputs.VERSION }}\", \"body\": $BODY}")
          RELEASE_ID=$(echo $RESPONSE | jq -r '.id')
          curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -F "attachment=@home-dashboard-card.js"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh release create "${{ steps.version.outputs.VERSION }}" \
            --repo "keysim86/ha-home-dashboard-card" \
            --title "Home Dashboard Card ${{ steps.version.outputs.VERSION }}" \
            --notes-file CHANGELOG.md \
            home-dashboard-card.js \
          || gh release upload "${{ steps.version.outputs.VERSION }}" \
            --repo "keysim86/ha-home-dashboard-card" \
            --clobber \
            home-dashboard-card.js
