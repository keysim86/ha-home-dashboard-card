name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    if: ${{ !contains(github.server_url, 'github.com') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update version in JS
        run: |
          sed -i "s/v1\.0\.0/${{ steps.version.outputs.VERSION }}/g" home-dashboard-card.js

      - name: Create Forgejo Release
        env:
          FORGEJO_TOKEN: ${{ github.token }}
        run: |
          VERSION_NO="${{ steps.version.outputs.VERSION }}"
          VERSION_NO="${VERSION_NO#v}"
          BODY=$(awk "/^## \[$VERSION_NO\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md | jq -Rs .)
          RESPONSE=$(curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${{ steps.version.outputs.VERSION }}\", \"name\": \"Home Dashboard Card ${{ steps.version.outputs.VERSION }}\", \"body\": $BODY}")
          RELEASE_ID=$(echo $RESPONSE | jq -r '.id')
          curl -s -X POST \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/$RELEASE_ID/assets" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -F "attachment=@home-dashboard-card.js"

      - name: Push tag to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git remote add github https://x-access-token:$GH_TOKEN@github.com/keysim86/ha-home-dashboard-card.git
          git push github refs/tags/${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION_NO="${{ steps.version.outputs.VERSION }}"
          VERSION_NO="${VERSION_NO#v}"
          BODY=$(awk "/^## \[$VERSION_NO\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md | jq -Rs .)
          RESPONSE=$(curl -s -X POST \
            "https://api.github.com/repos/keysim86/ha-home-dashboard-card/releases" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\": \"${{ steps.version.outputs.VERSION }}\", \"name\": \"Home Dashboard Card ${{ steps.version.outputs.VERSION }}\", \"body\": $BODY}")
          RELEASE_ID=$(echo $RESPONSE | jq -r '.id')
          curl -s -X POST \
            "https://uploads.github.com/repos/keysim86/ha-home-dashboard-card/releases/$RELEASE_ID/assets?name=home-dashboard-card.js" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/javascript" \
            --data-binary "@home-dashboard-card.js"
